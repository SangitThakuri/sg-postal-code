name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow only one concurrent deployment
concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push to gh-pages branch

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Download Singapore buildings data
        run: node scripts/download-data.js

      - name: Split buildings data into sector files
        run: node scripts/split-data.js

      - name: Build client-side search index
        run: node scripts/build-search-index.js

      - name: Prepare source tree for static export
        run: node scripts/prepare-ghpages.js

      - name: Build static site
        env:
          GITHUB_PAGES: "true"
          NEXT_PUBLIC_GITHUB_PAGES: "true"
        run: npm run build

      - name: Add .nojekyll (prevents GitHub Pages from ignoring _next/)
        run: touch out/.nojekyll

      - name: Copy CNAME for custom domain
        run: |
          if [ -f CNAME ]; then cp CNAME out/CNAME; fi

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          force_orphan: true
